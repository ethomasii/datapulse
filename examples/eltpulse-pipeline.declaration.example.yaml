# Example: declarative pipeline for POST /api/elt/pipelines/declaration
# Same fields as JSON POST /api/elt/pipelines — use upsert: true for GitOps (create or replace by name + tool).
#
# curl -H "Authorization: Bearer <session>" -H "Content-Type: application/yaml" \
#   --data-binary @examples/eltpulse-pipeline.declaration.example.yaml \
#   "https://app.example.com/api/elt/pipelines/declaration?mode=upsert"

eltpulse_pipeline_declaration: 1
upsert: true

name: github_example_to_snowflake
sourceType: github
destinationType: snowflake
tool: auto

description: "Example declarative pipeline — adjust sourceConfiguration for your repo."

sourceConfiguration:
  repo_owner: YOUR_ORG
  repo_name: YOUR_REPO
  resources: "issues,pull_requests"
  github_token_env: GITHUB_TOKEN
  # Partition + dbt (optional) — same shape as the builder JSON tab:
  # _partitionConfig:
  #   type: date
  #   column: updated_at
  # dlt_dbt:
  #   enabled: true
  #   package_path: https://github.com/yourorg/dbt-analytics.git

sliceIntent: sliced
partitionsNote: "Daily slices; gateway passes partition_key from run.partitionValue."

executionHost: inherit
